<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias Web</title>
    <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
:root{
    --primary-color: #fd0f0f;
    --secondary-color: #ffffff;
    --tertiary-color: #000000;
    --quaternary-color: #dad7d7;
}
.claro{
    --primary-color: #fd0f0f;
    --secondary-color: #ffffff;
    --tertiary-color: #000000;
    --quaternary-color: #dad7d7;
}
.escuro{
    --primary-color: #4e0101;
    --secondary-color: #111111;
    --tertiary-color: #602525;
    --quaternary-color: #7d7d7d;
}
body{
    background-color: var(--quaternary-color);
    transition: background-color 0.3s;
}
header{
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    background-color: var(--primary-color);
    margin: 5px;
    border: 3px solid var(--tertiary-color);
    border-radius: 10px;
    padding: 10px 0;
    position: relative;
}
header h1{
    font-size: clamp(1.5rem, 5vw, 4rem);
    color: var(--quaternary-color);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    cursor: pointer;
}
header button{
    position: absolute;
    top: 15px;
    right: 15px;
    padding: 8px 16px;
    border: 2px solid var(--tertiary-color);
    border-radius: 10px;
    background-color: var(--quaternary-color);
    color: var(--tertiary-color);
    font-weight: bold;
    cursor: pointer;
    font-size: 0.9rem;
}
header button:hover{
    background-color: var(--primary-color);
    border-color: var(--secondary-color);
}
nav{
    padding: 10px 20px;
}
nav a{
    color: var(--primary-color);
    text-decoration: none;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-weight: bold;
    font-size: 1rem;
}
nav a:hover{ opacity: 0.7; }
.noticias {
    margin: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}
.noticia{
    width: calc(33% - 20px);
    min-width: 280px;
    padding: 20px;
    border: 2px solid var(--tertiary-color);
    background-color: var(--primary-color);
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.noticia img{
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s;
}
.noticia img:hover{ opacity: 0.85; }
.noticia h2{
    text-align: center;
    color: var(--quaternary-color);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 1.1rem;
}
.noticia p{
    color: var(--secondary-color);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 0.95rem;
    line-height: 1.5;
    flex: 1;
}
.noticia a{
    display: inline-block;
    color: var(--quaternary-color);
    font-weight: bold;
    text-decoration: none;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    border: 1px solid var(--quaternary-color);
    padding: 6px 14px;
    border-radius: 8px;
    text-align: center;
    transition: background-color 0.2s;
}
.noticia a:hover{
    background-color: rgba(255,255,255,0.15);
}
.lightbox{
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000000cc;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    cursor: pointer;
}
.lightbox-img {
    max-width: 85%;
    max-height: 85%;
    border-radius: 10px;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
}
.fechar{
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 40px;
    color: #fff;
    cursor: pointer;
    line-height: 1;
}
footer{
    text-align: center;
    padding: 20px;
    font-family: 'Segoe UI', sans-serif;
    color: var(--tertiary-color);
    font-size: 0.85rem;
    margin-top: 20px;
}
    </style>
</head>

    function alterar_tema() {
        var body = document.body;
        var btn = document.querySelector('header button');
        if (body.classList.contains("escuro")) {
            body.classList.remove("escuro");
            body.classList.add("claro");
            btn.textContent = "☀️ Tema";
        } else {
            body.classList.remove("claro");
            body.classList.add("escuro");
            btn.textContent = "🌙 Tema";
        }
    }

    function abrir_lightbox(element) {
        var lightbox = document.getElementById("lightbox");
        var lightbox_img = document.getElementById("lightbox-img");
        lightbox_img.src = element.src;
        lightbox.style.display = "flex";
    }

    function fechar_ligthbox() {
        document.getElementById("lightbox").style.display = "none";
    }

    function mudar_titulo(element) {
        element.innerText = "Portal Web";
    }

    function exibir_noticias() {
        const section = document.getElementById("noticias");
        var html = "";
        NOTICIAS.forEach(function(noticia) {
            html += `
                <article class="noticia">
                    <img src="${noticia.imagem}" onclick="abrir_lightbox(this)" alt="${noticia.titulo}">
                    <h2>${noticia.titulo}</h2>
                    <p>${noticia.conteudo}</p>
                    <a href="${noticia.link}">Leia Mais...</a>
                </article>
            `;
        });
        section.innerHTML = html;
    }
    </script>
