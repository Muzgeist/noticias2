<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../ico/news.ico">
    <link rel="stylesheet" href="../css/noticas.css">
    <script src="../js/formulario.js" defer></script>
    <title>Cadastrar Notícia</title>
</head>

<body class="escuro">
    <header>
        <button onclick="alterar_tema()">Tema</button>
        <img src="../img/webnews.png" alt="webnews">
        <h1>Cadastrar Notícia</h1>
    </header>
    <nav>
        <a href="noticias.html">← Voltar para Notícias</a>
    </nav>
    <main>
        <section class="formulario-section">
            <h2>Nova Notícia</h2>
            <div id="mensagem" class="mensagem oculto"></div>
            <div class="formulario-card">
                <div class="campo">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" placeholder="Digite o título da notícia" maxlength="250">
                </div>

                <div class="campo">
                    <label for="conteudo">Conteúdo</label>
                    <textarea id="conteudo" placeholder="Digite o conteúdo da notícia" rows="8"></textarea>
                </div>

                <div class="campo">
                    <label for="caminhoImagem">Caminho da Imagem</label>
                    <input type="text" id="caminhoImagem" placeholder="Ex: ../img/noticia.png" maxlength="250">
                </div>

                <div class="campo">
                    <label for="link">Link da Notícia</label>
                    <input type="text" id="link" placeholder="Ex: ../html/noticia.html" maxlength="250">
                </div>

                <div class="acoes">
                    <button class="btn-limpar" onclick="limpar_formulario()">Limpar</button>
                    <button class="btn-cadastrar" onclick="cadastrar_noticia()">Cadastrar</button>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
</body>

</html>
